
{% extends "layout.html" %}
{% block content %}

<h3>Add Transaction</h3>

<form method="post">

<select name="property" class="form-control mb-2">
{% for p in properties %}
<option value="{{p.id}}">{{p.name}}</option>
{% endfor %}
</select>

<select name="unit" class="form-control mb-2">
{% for u in units %}
<option value="{{u.id}}">{{u.name}}</option>
{% endfor %}
</select>

<input type="date" name="date" class="form-control mb-2">

<select name="type" class="form-control mb-2">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<input name="category" placeholder="Category" class="form-control mb-2">
<input name="amount" placeholder="Amount" class="form-control mb-2">
<input name="notes" placeholder="Notes" class="form-control mb-2">

<button class="btn btn-success">Save</button>

</form>

{% endblock %}
